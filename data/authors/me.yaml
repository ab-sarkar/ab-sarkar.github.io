bio: |
  Abhishek Sarkar is a researcher specializing in Information Theory, 
  having earned his Ph.D. from the [Electrical Engineering department of the Indian Institute of Technology (IIT) Bombay](https://www.ee.iitb.ac.in/web/index.php) in 2026 under the supervision of 
  [Prof. Bikash Kumar Dey](https://www.ee.iitb.ac.in/wiki/faculty/bikash) and [Prof. Sibi Raj B. Pillai](https://www.ee.iitb.ac.in/~bsraj/). His doctoral thesis, **“Identification over Permutation Channels,”** explores the fundamental limits of communication over the classical Permutation channels from the point of view of message identification.
  His research explores the fundamental limits of communication systems,
  with a specific emphasis on DNA storage channels and wireless networks. 
  Driven by a commitment to formal mathematical rigor, his current work investigates advanced models for permutation channels—
  including Gaussian and constraint dynamics, as well as the theoretical frameworks surrounding message identification. 
  Outside of his academic research, he maintains active interests in trekking, traveling, and pencil sketching.

